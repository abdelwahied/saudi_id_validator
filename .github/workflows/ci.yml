# Continuous integration for the saudi_id_validator Drupal module.
#
# Each matrix cell delegates to the reusable workflow, which builds a Drupal
# site and runs composer validate, PHPCS (Drupal + DrupalPractice) and PHPUnit.
#
# Matrix: PHP {8.3, 8.5} × Drupal {10.3, 11.x}. The PHP 8.5 × Drupal 10.3 cell
# is excluded on purpose — Drupal 10.3 targets PHP 8.1–8.3 and predates 8.5.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.5']
        drupal: ['~10.3.0', '^11']
        exclude:
          - php: '8.5'
            drupal: '~10.3.0'
    name: PHP ${{ matrix.php }} · Drupal ${{ matrix.drupal }}
    uses: ./.github/workflows/reusable-tests.yml
    with:
      module: saudi_id_validator
      php-version: ${{ matrix.php }}
      drupal-constraint: ${{ matrix.drupal }}
