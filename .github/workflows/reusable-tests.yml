# Reusable CI for this standalone Drupal module.
#
# It builds a throwaway Drupal site at the requested core version, places the
# module (which is this repository's root) into web/modules/custom, and runs
# composer validate, PHPCS (Drupal and DrupalPractice separately) and PHPUnit.
# Every step fails the job on a non-zero exit — nothing is soft-failed.
name: Tests (reusable)

on:
  workflow_call:
    inputs:
      module:
        description: 'The module machine name (this repository).'
        required: true
        type: string
      php-version:
        required: true
        type: string
      drupal-constraint:
        description: 'Composer constraint for drupal/recommended-project, e.g. ~10.3.0 or ^11.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    name: PHP ${{ inputs.php-version }} · Drupal ${{ inputs.drupal-constraint }}
    steps:
      - name: Check out the module
        uses: actions/checkout@v4
        with:
          path: module_src

      - name: Set up PHP ${{ inputs.php-version }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: mbstring, gd, pdo_sqlite, sqlite3, sockets, curl, dom, xml, tokenizer, json
          coverage: none
          tools: composer:v2

      - name: composer validate
        working-directory: module_src
        run: composer validate --strict --no-check-all

      - name: Build the Drupal site
        run: |
          set -euo pipefail
          composer create-project "drupal/recommended-project:${{ inputs.drupal-constraint }}" drupal \
            --no-interaction --no-install
          cd drupal
          composer config --no-plugins allow-plugins.composer/installers true
          composer config --no-plugins allow-plugins.drupal/core-composer-scaffold true
          composer config --no-plugins allow-plugins.drupal/core-project-message true
          composer config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer config --no-plugins allow-plugins.phpstan/extension-installer true
          composer config --no-plugins allow-plugins.php-http/discovery true
          composer config --no-plugins allow-plugins.tbachert/spi true
          # Keep the default "stable" minimum-stability from recommended-project:
          # forcing "dev" drags composer/composer dev-main into resolution, which
          # conflicts with the runner's composer on the Drupal 10.3 line.
          #
          # drupal/core-dev on the 10.3 line pins justinrainbow/json-schema ^5.2,
          # while the composer/composer it transitively requires now needs
          # json-schema ^6 — an unsolvable pair, and the only composer/composer
          # that uses json-schema 5 (the 2.7 series) is blocked by advisories.
          # composer/composer is exercised only by core BuildTests, which this
          # module does not run, so on 10.3 we replace it out to break the knot.
          if [[ "${{ inputs.drupal-constraint }}" == '~10.3'* ]]; then
            jq '.replace = ((.replace // {}) + {"composer/composer": "*"})' composer.json > composer.tmp.json
            mv composer.tmp.json composer.json
          fi
          composer require --dev --no-update \
            "drupal/core-dev:${{ inputs.drupal-constraint }}" "drupal/coder:^8.3" "drush/drush:^12 || ^13"
          composer update --no-interaction --prefer-dist --no-progress

      - name: Install contrib dependencies (tap_payment only)
        if: inputs.module == 'tap_payment'
        working-directory: drupal
        run: composer require --no-interaction --prefer-dist --no-progress "drupal/commerce:^3" "drupal/webform:^6.3"

      - name: Place the module under test
        run: |
          set -euo pipefail
          mkdir -p "drupal/web/modules/custom/${{ inputs.module }}"
          rsync -a --exclude='.git' --exclude='.github' module_src/ "drupal/web/modules/custom/${{ inputs.module }}/"
          # domain_availability depends on saudi_id_validator; fetch the sibling
          # from its published repository (public clone, no auth needed).
          if [ "${{ inputs.module }}" = "domain_availability" ]; then
            git clone --depth 1 https://github.com/abdelwahied/saudi_id_validator.git \
              drupal/web/modules/custom/saudi_id_validator
          fi

      - name: PHPCS (Drupal)
        working-directory: drupal
        run: vendor/bin/phpcs --standard=Drupal --extensions=php,module,inc,install,yml,js "web/modules/custom/${{ inputs.module }}"

      - name: PHPCS (DrupalPractice)
        working-directory: drupal
        run: vendor/bin/phpcs --standard=DrupalPractice --extensions=php,module,inc,install,yml,js "web/modules/custom/${{ inputs.module }}"

      - name: Install the site (sqlite)
        working-directory: drupal
        run: |
          set -euo pipefail
          # The files directory and a writable sites/default must exist before
          # drush can write settings.php and the sqlite database into them.
          mkdir -p web/sites/default/files
          chmod -R 0777 web/sites/default
          php -d memory_limit=-1 vendor/bin/drush site:install standard \
            --db-url=sqlite://localhost/sites/default/files/.ht.site.sqlite \
            --site-name=CI --account-name=admin --account-pass=admin -y
          chmod -R 0777 web/sites/default/files

      - name: Start the test web server
        working-directory: drupal
        run: |
          set -euo pipefail
          mkdir -p web/sites/simpletest/browser_output
          chmod -R 0777 web/sites/simpletest
          php -S 127.0.0.1:8080 -t web web/.ht.router.php > /tmp/php-server.log 2>&1 &
          for i in $(seq 1 15); do
            if curl -sSf http://127.0.0.1:8080/ > /dev/null 2>&1; then break; fi
            sleep 1
          done

      - name: PHPUnit
        working-directory: drupal
        env:
          SIMPLETEST_DB: 'sqlite://localhost/sites/default/files/.ht.test.sqlite'
          SIMPLETEST_BASE_URL: 'http://127.0.0.1:8080'
          BROWSERTEST_OUTPUT_DIRECTORY: '${{ github.workspace }}/drupal/web/sites/simpletest/browser_output'
          # Third-party modules emit deprecations on the newest core; the module's
          # own code emits none. Do not fail an otherwise-green run on them.
          SYMFONY_DEPRECATIONS_HELPER: disabled
        run: |
          set -euo pipefail
          # Absolute paths: tests marked #[RunTestsInSeparateProcesses] fork a
          # subprocess that re-reads the configuration, and on the older PHPUnit
          # shipped with Drupal 10.3 a relative --configuration path is not found
          # from the subprocess. $(pwd) is the drupal/ site root here.
          php -d memory_limit=-1 vendor/bin/phpunit \
            -c "$(pwd)/web/core/phpunit.xml.dist" \
            "$(pwd)/web/modules/custom/${{ inputs.module }}"
