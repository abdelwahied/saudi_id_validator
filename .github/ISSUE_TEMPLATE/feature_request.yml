name: Feature request
description: Suggest a backward-compatible enhancement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to achieve that the module does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: checkboxes
    id: compat
    attributes:
      label: Compatibility
      options:
        - label: This can be added without breaking the public API (targets a 1.1.x minor release).
